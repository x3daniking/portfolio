<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Muhammad Adnan — Portfolio (preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
:root {
  --navy: #0a1020;
  --navy-2: #101a30;
  --blue: #2563eb;
  --blue-2: #7aa2f7;
  --ink: #0b1524;
  --muted: #46566f;
  --muted-2: #5a6b85;
  --line: #e7edf6;
  --bg-soft: #f6f9fd;
  --chip: #eff4fb;
  --chip-line: #e1e8f2;
  --head: 'Space Grotesk', sans-serif;
  --body: 'Plus Jakarta Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --container: 1180px;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: var(--body);
  color: var(--ink);
  background: #ffffff;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

.container {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 28px;
}

section {
  scroll-margin-top: 88px;
}

.eyebrow {
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--blue);
  text-transform: uppercase;
  margin: 0 0 18px;
}

.section-pad { padding: 104px 0; }

.h2 {
  font-family: var(--head);
  font-weight: 700;
  font-size: clamp(34px, 4.4vw, 56px);
  line-height: 1.05;
  letter-spacing: -1.5px;
  margin: 0 0 18px;
}

.lead {
  font-size: clamp(17px, 1.7vw, 21px);
  line-height: 1.6;
  color: var(--muted-2);
  max-width: 720px;
  margin: 0;
  text-wrap: pretty;
}

/* ---------- Scroll reveal ---------- */
.reveal {
  opacity: 0;
  transform: translateY(26px);
  transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: opacity, transform;
}
.reveal.in {
  opacity: 1;
  transform: none;
}
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  .reveal { opacity: 1; transform: none; transition: none; }
}

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--body);
  font-weight: 600;
  font-size: 16px;
  padding: 14px 24px;
  border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}
.btn-primary {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 12px 26px -10px rgba(37, 99, 235, 0.6);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 18px 34px -10px rgba(37, 99, 235, 0.7); }
.btn-ghost {
  background: transparent;
  color: #fff;
  border-color: rgba(255, 255, 255, 0.25);
}
.btn-ghost:hover { border-color: rgba(255, 255, 255, 0.6); transform: translateY(-2px); }
.btn-dark {
  background: var(--ink);
  color: #fff;
}
.btn-dark:hover { transform: translateY(-2px); }
.btn-light {
  background: #fff;
  color: var(--ink);
  border-color: var(--chip-line);
}
.btn-light:hover { transform: translateY(-2px); border-color: #c8d4e6; }

/* ---------- Nav ---------- */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  height: 72px;
  display: flex;
  align-items: center;
  transition: background 0.3s ease, box-shadow 0.3s ease, backdrop-filter 0.3s ease;
}
.nav.scrolled {
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
  box-shadow: 0 1px 0 rgba(13, 30, 60, 0.07);
}
.nav-inner {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--head);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -0.3px;
}
.brand-mark {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--ink);
  color: #fff;
  display: grid;
  place-items: center;
  font-size: 16px;
  letter-spacing: -0.5px;
}
.nav.scrolled .brand { color: var(--ink); }
.nav-links {
  display: flex;
  align-items: center;
  gap: 30px;
}
.nav-links a.link {
  font-size: 15px;
  font-weight: 500;
  color: var(--muted);
  transition: color 0.18s ease;
}
.nav-links a.link:hover { color: var(--blue); }
.nav-cta { padding: 10px 18px; font-size: 14px; }

.nav-toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
}
.nav-toggle span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--ink);
  margin: 5px 0;
  transition: transform 0.25s ease, opacity 0.25s ease;
}

/* hero nav is on dark bg until scrolled */
.nav:not(.scrolled) .brand,
.nav:not(.scrolled) .nav-links a.link { color: rgba(255, 255, 255, 0.82); }
.nav:not(.scrolled) .brand-mark { background: #fff; color: var(--ink); }
.nav:not(.scrolled) .nav-links a.link:hover { color: #fff; }
.nav:not(.scrolled) .nav-toggle span { background: #fff; }

/* ---------- Hero ---------- */
.hero {
  position: relative;
  background: var(--navy);
  color: #fff;
  overflow: hidden;
  padding: 168px 0 120px;
}
.hero-glow {
  position: absolute;
  top: -180px;
  right: -120px;
  width: 620px;
  height: 620px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37, 99, 235, 0.45) 0%, rgba(37, 99, 235, 0) 70%);
  pointer-events: none;
}
.hero-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(37, 99, 235, 0.28);
  pointer-events: none;
}
.hero-ring.r1 { top: -220px; right: -160px; width: 660px; height: 660px; }
.hero-ring.r2 { top: -120px; right: -60px; width: 440px; height: 440px; border-color: rgba(37,99,235,0.18); }
.hero-inner { position: relative; z-index: 2; }
.hero-kicker {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--blue-2);
  margin-bottom: 26px;
}
.hero-kicker .dash { width: 38px; height: 2px; background: var(--blue); }
.hero h1 {
  font-family: var(--head);
  font-weight: 700;
  font-size: clamp(52px, 9vw, 116px);
  line-height: 0.98;
  letter-spacing: -3px;
  margin: 0 0 26px;
}
.hero p.intro {
  font-size: clamp(18px, 2vw, 26px);
  line-height: 1.5;
  color: #c4cfe2;
  max-width: 760px;
  margin: 0 0 38px;
  text-wrap: pretty;
}
.hero p.intro b { color: #fff; font-weight: 600; }
.hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 56px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px 40px;
  font-family: var(--mono);
  font-size: 14px;
  color: #aebcd6;
}
.hero-meta a { transition: color 0.18s ease; }
.hero-meta a:hover { color: #fff; }

/* ---------- Stats / About ---------- */
.about-grid {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 64px;
  align-items: center;
}
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.stat {
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 28px;
}
.stat.dark { background: var(--navy); color: #fff; }
.stat .num {
  font-family: var(--head);
  font-weight: 700;
  font-size: 52px;
  line-height: 1;
  color: var(--blue);
}
.stat.dark .num { color: #fff; font-size: 38px; line-height: 1.05; }
.stat .lbl { font-size: 16px; color: var(--muted-2); margin-top: 10px; }
.stat.dark .lbl { color: #aebcd6; }
.about-copy p { font-size: 19px; line-height: 1.6; color: var(--muted); margin: 0 0 18px; text-wrap: pretty; }

/* ---------- Capability cards ---------- */
.cap-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.cap {
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 30px;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}
.cap:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -22px rgba(13, 30, 60, 0.3); border-color: #d4e0f2; }
.cap.dark { background: var(--navy); color: #fff; }
.cap .idx { font-family: var(--mono); font-size: 14px; color: var(--blue); letter-spacing: 1px; }
.cap.dark .idx { color: var(--blue-2); }
.cap h3 { font-family: var(--head); font-weight: 700; font-size: 24px; margin: 12px 0 10px; }
.cap p { font-size: 16px; line-height: 1.5; color: var(--muted-2); margin: 0; }
.cap.dark p { color: #aebcd6; }

/* ---------- Tech stack ---------- */
.stack-section { background: var(--bg-soft); }
.stack-row {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 28px;
  align-items: start;
  padding: 28px 0;
  border-top: 1px solid var(--line);
}
.stack-row:first-of-type { border-top: none; }
.stack-cat { font-family: var(--mono); font-size: 16px; letter-spacing: 1px; color: var(--blue); padding-top: 6px; }
.chips { display: flex; flex-wrap: wrap; gap: 12px; }
.chip {
  padding: 10px 18px;
  border-radius: 999px;
  background: #fff;
  border: 1px solid var(--chip-line);
  font-size: 15px;
  font-weight: 600;
  color: #33455f;
}

/* ---------- Projects ---------- */
.project {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 60px;
  align-items: center;
  padding: 56px 0;
  border-top: 1px solid var(--line);
}
.project:first-of-type { border-top: none; padding-top: 8px; }
.project.reverse .project-visual { order: 2; }
.browser {
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 36px 80px -28px rgba(13, 30, 60, 0.34);
  border: 1px solid #e3e9f2;
  background: #fff;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.browser:hover { transform: translateY(-5px); box-shadow: 0 46px 92px -28px rgba(13, 30, 60, 0.4); }
.browser-bar {
  height: 44px;
  background: #f3f6fa;
  border-bottom: 1px solid #e6ecf4;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 16px;
}
.dot { width: 11px; height: 11px; border-radius: 50%; }
.dot.r { background: #ff5f57; }
.dot.y { background: #febc2e; }
.dot.g { background: #28c840; }
.browser-url {
  margin-left: 12px;
  flex: 1;
  height: 26px;
  border-radius: 7px;
  background: #e7edf4;
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-family: var(--mono);
  font-size: 13px;
  color: #6b7a90;
}
.tag-pill {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--blue);
  background: var(--chip);
  border: 1px solid #dbe6f5;
  border-radius: 999px;
  padding: 6px 14px;
  display: inline-block;
  margin-bottom: 18px;
}
.project h3 {
  font-family: var(--head);
  font-weight: 700;
  font-size: clamp(30px, 3.4vw, 44px);
  line-height: 1.05;
  letter-spacing: -1px;
  margin: 0 0 16px;
}
.project .desc { font-size: 19px; line-height: 1.55; color: var(--muted); margin: 0 0 22px; }
.bullets { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
.bullet { display: flex; gap: 13px; align-items: flex-start; }
.bullet .sq { flex: none; width: 11px; height: 11px; border-radius: 3px; background: var(--blue); margin-top: 7px; }
.bullet span.txt { font-size: 17px; line-height: 1.45; color: #2c3a51; }
.bullet b { color: var(--ink); }
.tags { display: flex; flex-wrap: wrap; gap: 9px; }
.tag {
  padding: 7px 15px;
  border-radius: 999px;
  background: var(--bg-soft);
  border: 1px solid var(--chip-line);
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
}

/* ---------- Mobile section ---------- */
.mobile-section { background: var(--navy); color: #fff; position: relative; overflow: hidden; }
.mobile-glow {
  position: absolute;
  top: -160px; left: -140px;
  width: 520px; height: 520px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37,99,235,0.28) 0%, rgba(37,99,235,0) 70%);
}
.mobile-section .eyebrow { color: var(--blue-2); }
.mobile-section .h2 { color: #fff; }
.mobile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; position: relative; z-index: 2; }
.app-card {
  background: var(--navy-2);
  border: 1px solid #20304e;
  border-radius: 22px;
  padding: 38px;
}
.app-card.with-phone { display: grid; grid-template-columns: 1fr 220px; gap: 32px; align-items: center; }
.app-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--blue-2);
  background: rgba(37, 99, 235, 0.14);
  border: 1px solid #2a3c5e;
  border-radius: 999px;
  padding: 6px 14px;
  margin-bottom: 20px;
}
.app-card h3 { font-family: var(--head); font-weight: 700; font-size: 32px; margin: 0 0 14px; }
.app-card .desc { font-size: 17px; line-height: 1.5; color: #bfcce0; margin: 0 0 22px; }
.app-card .bullet .txt { color: #cdd8ea; font-size: 16px; }
.app-card .tag { background: #16223a; border-color: #2a3c5e; color: #aebcd6; }
.phone {
  border-radius: 30px;
  background: #05080f;
  padding: 9px;
  box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6);
}
.phone-screen { border-radius: 23px; overflow: hidden; background: #000; }

/* ---------- Why me ---------- */
.why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.why {
  display: flex;
  gap: 22px;
  align-items: flex-start;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 34px 36px;
}
.why.dark { background: var(--navy); color: #fff; }
.why .n { font-family: var(--head); font-weight: 700; font-size: 30px; color: var(--blue); flex: none; }
.why.dark .n { color: var(--blue-2); }
.why h3 { font-family: var(--head); font-weight: 700; font-size: 24px; margin: 0 0 9px; }
.why p { font-size: 17px; line-height: 1.5; color: var(--muted-2); margin: 0; }
.why.dark p { color: #aebcd6; }

/* ---------- Contact ---------- */
.contact-section { background: var(--navy); color: #fff; position: relative; overflow: hidden; }
.contact-glow {
  position: absolute;
  bottom: -200px; right: -160px;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37,99,235,0.4) 0%, rgba(37,99,235,0) 70%);
}
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 70px; position: relative; z-index: 2; align-items: start; }
.contact-section .eyebrow { color: var(--blue-2); }
.contact-section h2 {
  font-family: var(--head);
  font-weight: 700;
  font-size: clamp(44px, 6.5vw, 88px);
  line-height: 1;
  letter-spacing: -2.5px;
  margin: 0 0 22px;
}
.contact-section .lead { color: #c4cfe2; max-width: 520px; }
.contact-links { margin-top: 34px; display: grid; gap: 18px; }
.contact-link { display: flex; flex-direction: column; gap: 5px; }
.contact-link .k { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; color: #6f7f9c; }
.contact-link .v { font-size: 19px; font-weight: 600; color: #fff; transition: color 0.18s ease; }
a.contact-link:hover .v { color: var(--blue-2); }

.form {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 22px;
  padding: 34px;
}
.field { margin-bottom: 18px; }
.field label { display: block; font-family: var(--mono); font-size: 13px; letter-spacing: 1px; color: #9fb0cc; margin-bottom: 8px; }
.field input, .field textarea {
  width: 100%;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 12px;
  padding: 13px 16px;
  color: #fff;
  font-family: var(--body);
  font-size: 16px;
  transition: border-color 0.18s ease, background 0.18s ease;
}
.field input::placeholder, .field textarea::placeholder { color: #6f7f9c; }
.field input:focus, .field textarea:focus {
  outline: none;
  border-color: var(--blue);
  background: rgba(37, 99, 235, 0.1);
}
.field textarea { resize: vertical; min-height: 110px; }
.form .btn { width: 100%; justify-content: center; }

/* ---------- Footer ---------- */
.footer {
  background: #060a13;
  color: #7d8aa3;
  padding: 36px 0;
}
.footer-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 14px;
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 1px;
}
.footer a:hover { color: #fff; }

/* ---------- Responsive ---------- */
@media (max-width: 920px) {
  .nav-links { display: none; }
  .nav-toggle { display: block; }
  .nav-links.open {
    display: flex;
    position: absolute;
    top: 72px;
    left: 0;
    right: 0;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    background: #fff;
    padding: 12px 28px 22px;
    box-shadow: 0 14px 30px -16px rgba(13, 30, 60, 0.3);
  }
  .nav-links.open a.link { color: var(--ink); padding: 14px 0; border-bottom: 1px solid var(--line); }
  .nav-links.open .nav-cta { margin-top: 14px; text-align: center; justify-content: center; }

  .about-grid { grid-template-columns: 1fr; gap: 40px; }
  .cap-grid { grid-template-columns: 1fr 1fr; }
  .project { grid-template-columns: 1fr; gap: 34px; }
  .project.reverse .project-visual { order: 0; }
  .mobile-grid { grid-template-columns: 1fr; }
  .app-card.with-phone { grid-template-columns: 1fr; }
  .app-card.with-phone .phone { max-width: 230px; margin: 0 auto; }
  .why-grid { grid-template-columns: 1fr; }
  .contact-grid { grid-template-columns: 1fr; gap: 44px; }
  .stack-row { grid-template-columns: 1fr; gap: 14px; }
}

@media (max-width: 560px) {
  .section-pad { padding: 72px 0; }
  .cap-grid { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .hero { padding: 140px 0 90px; }
  .hero-meta { font-size: 12px; gap: 10px 22px; }
}

</style>
</head>

<script type="text/plain" id="app-src">
const { useState, useEffect, useRef } = React;

/* Image base path — works under Vite (base: '/portfolio/') and at any deploy root. */
const BASE = 'public/'
const asset = (p) => BASE + p

const UPWORK = 'https://www.upwork.com/freelancers/~019bfcdb4c3cae2292'
const GITHUB = 'https://github.com/x3daniking'
const EMAIL = 'malikadnan655@gmail.com'
const PHONE = '+92 304 5733047'

/* When embedded in an iframe (preview tooling), IntersectionObserver is often
   suppressed, so reveal everything immediately. On the real deployed top-level
   site this is false and the scroll-reveal animation runs normally. */
const IN_IFRAME = (() => {
  try {
    return window.self !== window.top
  } catch (e) {
    return true
  }
})()

/* ----------------------------------------------------------------- */
/* Scroll-reveal wrapper                                             */
/* ----------------------------------------------------------------- */
function Reveal({ children, className = '', delay = 0, as: Tag = 'div' }) {
  const ref = useRef(null)
  const [shown, setShown] = useState(false)
  useEffect(() => {
    const el = ref.current
    if (!el) return
    if (IN_IFRAME) {
      setShown(true)
      return
    }
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            setShown(true)
            io.unobserve(e.target)
          }
        })
      },
      { threshold: 0.14, rootMargin: '0px 0px -8% 0px' },
    )
    io.observe(el)
    return () => io.disconnect()
  }, [])
  return (
    <Tag
      ref={ref}
      className={IN_IFRAME ? className : `reveal ${shown ? 'in' : ''} ${className}`}
      style={IN_IFRAME ? undefined : { transitionDelay: `${delay}ms` }}
    >
      {children}
    </Tag>
  )
}
